# Override only install + build. Let Nixpacks auto-set up Node from
# engines.node ("22.x") and .nvmrc. Skip Corepack: install pnpm via npm.

[phases.install]
cmds = [
  "npm install -g pnpm@11.1.3",
  "pnpm install --frozen-lockfile"
]

[phases.build]
cmds = ["pnpm build"]

[start]
cmd = "pnpm start -p $PORT"
