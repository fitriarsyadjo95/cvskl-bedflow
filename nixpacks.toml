providers = ["node"]

[phases.setup]
nixPkgs = ["nodejs_22"]

[phases.install]
dependsOn = ["setup"]
# Bypass Corepack entirely — Node 22's bundled Corepack has a known
# ERR_VM_DYNAMIC_IMPORT_CALLBACK_MISSING bug when loading pnpm 11.x's CJS
# bin script. Install pnpm globally via npm instead, which sidesteps Corepack
# completely.
cmds = [
  "npm install -g pnpm@11.1.3",
  "pnpm install --frozen-lockfile",
]

[phases.build]
dependsOn = ["install"]
cmds = ["pnpm build"]

[start]
cmd = "pnpm start -p $PORT"
