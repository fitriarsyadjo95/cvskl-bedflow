# Bypass Corepack — Node 22 / 24's bundled Corepack hits
# ERR_VM_DYNAMIC_IMPORT_CALLBACK_MISSING when loading pnpm 11.x's bin script.
# We install pnpm via npm (which doesn't go through Corepack) and use it directly.

[phases.setup]
nixPkgs = ["nodejs_22", "npm-10_x"]

[phases.install]
cmds = [
  "npm install -g pnpm@11.1.3",
  "pnpm install --frozen-lockfile"
]

[phases.build]
cmds = ["pnpm build"]

[start]
cmd = "pnpm start -p $PORT"
